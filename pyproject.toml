[tool.ruff]
target-version = "py310"
line-length = 100
exclude = [".git", ".venv"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B"]
ignore = ["B904"]

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["B017"]

[tool.coverage.run]
branch = true
source = [
  "autonmap",
  "decrypt",
  "kali_ai_scan",
  "recon_planner",
  "tool_inventory",
  "ui",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 55
